experiment:
  name: hotpotqa_round3_train10_val10
  benchmark: hotpotqa
  dataset_id: hotpotqa/hotpot_qa
  subset: distractor
  mode: cross_split_train_graph_transfer
  random_seed: 42
  methods:
    - LLM-only
    - TextRAG
    - VectorRAG
    - GraphRAG-hop1
    - GraphRAG-hop2
    - AgenticGraphRAG

data:
  train_split: train
  eval_split: validation
  train_fraction: 0.10
  eval_fraction: 0.10
  train_sample_strategy: random
  eval_sample_strategy: random
  persist_sample_ids: true
  processed_base_dir: data/processed/hotpotqa_round3_train10_val10

graph:
  graph_run_id: hotpotqa_train10_neo4j_v1
  reuse_existing_graph: true
  rebuild_if_config_changed: true
  backend: neo4j
  fallback_backend: networkx_json
  fulltext_index_name: hotpotqa_round3_train10_hotpotchunk_text_fts_v1
  extractor:
    mode: deterministic
    deterministic_extractor: deterministic_titlecase_cooccurrence_v2
    llm_extractor: ollama_llm_triple_extraction_v1
    use_llm_extraction: false
    llm_model: qwen2.5:7b-instruct-fp16
    max_chunks_for_llm_extraction: 200
    extraction_temperature: 0.0

indexing:
  chunking:
    max_sentences_per_chunk: 3
    overlap_sentences: 1
  text_index:
    enabled: true
    backend: bm25
    dir: data/indexes/hotpotqa_round3_train10_val10/text
  vector_index:
    enabled: true
    backend: ollama_embeddings
    dir: data/indexes/hotpotqa_round3_train10_val10/vector
    embed_model: nomic-embed-text:latest
    fallback_to_fulltext: false
  graph_artifact_dir: data/graph_runs/hotpotqa_train10_neo4j_v1

retrieval:
  top_k_text: 10
  top_k_vector: 10
  top_k_graph_paths: 5
  graph_hop1_depth: 1
  graph_hop2_depth: 2
  max_nodes_per_hop: 10

generation:
  provider: ollama
  qa_model: qwen2.5:7b-instruct-fp16
  ollama_host: http://localhost:11434
  temperature: 0.0
  max_context_tokens: 6000
  deterministic_fallback_enabled: true
  deterministic_fallback_name: deterministic_evidence_sentence_v1
  use_deterministic_for_main_eval: false

agent:
  pipeline_version: hotpotqa_agentic_graphrag_v1
  controller: bounded_deterministic_v1
  max_tool_calls: 10
  max_repair_rounds: 1
  max_graph_depth: 2
  verifier_enabled: true
  repair_enabled: true
  tools_used:
    - analyze_question
    - text_search
    - vector_search
    - entity_link
    - graph_expand
    - path_rank
    - evidence_fusion
    - answer_generate
    - evidence_verify
    - repair_retrieve
  skills_used:
    - question_analysis_skill
    - text_retrieval_skill
    - vector_retrieval_skill
    - graph_retrieval_skill
    - evidence_fusion_skill
    - grounded_answering_skill
    - repair_skill
  vg_graphrag_reference_used: true
  vg_graphrag_modules_called: []

judge:
  binary_judge_enabled: true
  openai_judge_enabled: false
  api_key_file: "C:\\Users\\kbllm\\Downloads\\api.txt"
  openai_judge_sample_size_per_method: 200
  continue_on_judge_error: true

evaluation:
  write_reports: true

output:
  run_dir: runs/hotpotqa_round3_train10_val10
  report_zh: reports/HOTPOTQA_ROUND3_TRAIN10_VAL10_REPORT_ZH.md
  report_en: reports/HOTPOTQA_ROUND3_TRAIN10_VAL10_REPORT_EN.md
